name: E-Commerce Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"   # Daily at 8 AM UTC
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit, all]
      tags:
        description: 'Test tags to run'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, regression, all]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        if: ${{ inputs.tags == 'smoke' || inputs.tags == '' }}
        run: npx playwright test --grep @smoke --project=${{ inputs.browser || 'chromium' }}

      - name: Run regression tests
        if: ${{ inputs.tags == 'regression' || inputs.tags == 'all' }}
        run: npx playwright test --grep @regression --project=${{ inputs.browser || 'chromium' }}

      - name: Run all tests
        if: ${{ inputs.tags == 'all' || github.event_name == 'schedule' }}
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
